    :root {

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 79, 163, 0.08), transparent 38%),
        radial-gradient(circle at bottom, rgba(255, 79, 163, 0.04), transparent 42%),
        var(--bg);
      color: var(--pink);
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image:
        linear-gradient(rgba(255,255,255,.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.09) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: screen;
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent,
        transparent 48%,
        rgba(255, 79, 163, 0.08) 50%,
        transparent 52%,
        transparent
      );
      background-size: 100% 8px;
      opacity: 0.25;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .terminal-wrap {
      width: min(940px, 100%);
      border: 1px solid rgba(255, 79, 163, 0.34);
      box-shadow:
        0 0 20px rgba(255, 79, 163, 0.25),
        inset 0 0 34px rgba(255, 79, 163, 0.08);
      padding: 18px;
      position: relative;
      overflow: hidden;
      background: rgba(5, 3, 8, 0.58);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(255, 79, 163, 0.25);
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    #terminal {
      height: calc(100vh - 154px);
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 15.5px;
      line-height: 1.64;
      text-shadow: 0 0 9px rgba(255, 79, 163, 0.78);
      padding-right: 6px;
    }

    #terminal::-webkit-scrollbar { width: 4px; }
    #terminal::-webkit-scrollbar-thumb { background: rgba(255, 79, 163, 0.4); }

    .cursor::after {
      content: "█";
      animation: blink 0.9s infinite;
      color: var(--soft-pink);
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    .controls {
      min-height: 50px;
      display: flex;
      align-items: center;
      margin-top: 12px;
    }

    button {
      background: transparent;
      border: 1px solid rgba(255, 79, 163, 0.78);
      color: var(--pink);
      padding: 11px 16px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      text-shadow: 0 0 8px rgba(255, 79, 163, 0.8);
      box-shadow: 0 0 12px rgba(255, 79, 163, 0.32);
      letter-spacing: 0.04em;
    }

    button:hover {
      background: var(--pink);
      color: #050505;
    }

    .hidden { display: none; }

    .hint {
      color: var(--dim);
      font-size: 12px;
      margin-left: 12px;
    }

    .shake-hard {
      animation: shakeHard 0.55s linear 3;
      border-color: rgba(255, 43, 95, 0.9);
      box-shadow:
        0 0 35px rgba(255, 43, 95, 0.55),
        inset 0 0 42px rgba(255, 43, 95, 0.16);
    }

    @keyframes shakeHard {
      0% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-8px, 4px) rotate(-0.5deg); }
      20% { transform: translate(7px, -5px) rotate(0.5deg); }
      30% { transform: translate(-10px, -3px) rotate(-0.7deg); }
      40% { transform: translate(9px, 5px) rotate(0.6deg); }
      50% { transform: translate(-6px, 6px) rotate(-0.5deg); }
      60% { transform: translate(8px, -6px) rotate(0.5deg); }
      70% { transform: translate(-7px, 4px) rotate(-0.4deg); }
      80% { transform: translate(6px, -3px) rotate(0.4deg); }
      90% { transform: translate(-4px, 2px) rotate(-0.2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    .red-flash {
      animation: redFlash 0.45s linear 4;
    }

    @keyframes redFlash {
      0%, 100% { background: rgba(5, 3, 8, 0.58); }
      50% { background: rgba(80, 0, 20, 0.78); }
    }

    @media (max-width: 520px) {
      .screen { padding: 10px; }
      .terminal-wrap { padding: 13px; }
      #terminal {
        font-size: 13.4px;
        height: calc(100vh - 136px);
      }
      .topbar { font-size: 10px; }
      button { font-size: 13px; }
    }
  </style>
</head>

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function triggerError() {
      wrap.classList.add("shake-hard", "red-flash");

    async function typeSequence(sequence) {
      isTyping = true;
      button.classList.add("hidden");
      hint.classList.add("hidden");

      for (const item of sequence) {
        if (item.pause) {
          await sleep(item.pause);
          continue;
        }

        if (item.error) triggerError();

        const speed = item.speed || NORMAL;

        for (const char of item.text) {
          terminal.textContent += char;
          terminal.scrollTop = terminal.scrollHeight;
          await sleep(speed);
        }

        if (item.final) {
          systemName.textContent = "E.V.A. // анализ завершён";
        }
      }

      isTyping = false;

      if (currentStep < steps.length - 1) {
        await sleep(900);
        button.classList.remove("hidden");
        hint.classList.remove("hidden");
      }
    }

    function nextStep() {
      if (isTyping) return;

      if (currentStep < steps.length - 1) {
        currentStep++;
        terminal.textContent += "\n\n";
        typeSequence(steps[currentStep]);
      }
    }

    button.addEventListener("click", nextStep);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        nextStep();
      }
    });

    typeSequence(steps[currentStep]);
