        transparent 52%,
        transparent

      opacity: 0.22;
    }

      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: flex;
      justify-content: center;

      padding: 18px;
      position: relative;
      overflow: hidden;
      background: rgba(5, 3, 8, 0.58);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(255, 79, 163, 0.25);
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    #terminal {
      height: calc(100vh - 154px);

      font-size: 15.5px;
      line-height: 1.66;
      text-shadow: 0 0 9px rgba(255, 79, 163, 0.78);
      padding-right: 6px;
    }

    #terminal::-webkit-scrollbar { width: 4px; }
    #terminal::-webkit-scrollbar-thumb { background: rgba(255, 79, 163, 0.4); }

    .cursor::after {
      content: "█";
      animation: blink 0.95s infinite;
      color: var(--soft-pink);
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    .controls {
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      background: transparent;
      border: 1px solid rgba(255, 79, 163, 0.78);
      color: var(--pink);
      padding: 11px 16px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      text-shadow: 0 0 8px rgba(255, 79, 163, 0.8);
      box-shadow: 0 0 12px rgba(255, 79, 163, 0.32);
      letter-spacing: 0.04em;
    }

    button:hover {
      background: var(--pink);
      color: #050505;
    }

    .hidden { display: none; }

    .hint {
      color: var(--dim);

      70% { transform: translate(-8px, 5px) rotate(-0.4deg); }
      80% { transform: translate(7px, -4px) rotate(0.4deg); }

    let audioCtx = null;

    let lastTick = 0;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, duration, type = "sine", volume = 0.035) {
      if (!soundEnabled || !audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration + 0.02);
    }

    function tickSound(char) {
      if (!soundEnabled || !audioCtx) return;
      const now = performance.now();
      if (now - lastTick < 45) return;
      lastTick = now;

      if (char === " " || char === "\n") return;

      const freq = 520 + Math.random() * 90;
      tone(freq, 0.018, "square", 0.006);
    }
