    async function typeSequence(sequence) {
      isTyping = true;
      button.classList.add("hidden");
      hint.classList.add("hidden");

      for (const item of sequence) {
        if (item.pause) {
          await sleep(item.pause);
          continue;
        }

        if (item.glitch) {
          wrap.classList.add("glitch");
          setTimeout(() => wrap.classList.remove("glitch"), 850);
        }

        const speed = item.speed || TYPE_SPEED;
        for (const char of item.text) {
          terminal.textContent += char;
          terminal.scrollTop = terminal.scrollHeight;
          await sleep(speed);
        }
      }

      isTyping = false;

      if (currentStep < steps.length - 1) {
        await sleep(800);
        button.classList.remove("hidden");
        hint.classList.remove("hidden");
      }
    }

      if (isTyping) return;

      if (currentStep < steps.length - 1) {
        currentStep++;
        terminal.textContent += "\n\n";
        typeSequence(steps[currentStep]);
      }
    }

    button.addEventListener("click", nextStep);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        nextStep();
      }
    });

    typeSequence(steps[currentStep]);
